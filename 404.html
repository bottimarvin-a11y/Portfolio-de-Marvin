<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Le Monde à l'Envers</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --st-red: #b71c1c;
            --st-red-bright: #ff1744;
            --st-red-glow: #ff6b6b;
            --st-bg: #050505;
            --st-text: #e8e0d0;
            --st-text-muted: #888;
        }

        html,
        body {
            height: 100%;
            background: var(--st-bg);
            color: var(--st-text);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        /* Animated particles background */
        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* Red vignette */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at center, transparent 35%, rgba(183, 28, 28, 0.18) 100%);
            pointer-events: none;
            z-index: 1;
        }

        /* Scan lines */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(0deg,
                    transparent,
                    transparent 2px,
                    rgba(0, 0, 0, 0.08) 2px,
                    rgba(0, 0, 0, 0.08) 4px);
            pointer-events: none;
            z-index: 2;
        }

        .page-wrapper {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            padding: 40px;
        }

        .error-code {
            font-size: clamp(100px, 20vw, 220px);
            font-weight: 900;
            line-height: 1;
            letter-spacing: -10px;
            color: transparent;
            -webkit-text-stroke: 2px var(--st-red-bright);
            text-shadow:
                0 0 20px rgba(255, 23, 68, 0.6),
                0 0 60px rgba(255, 23, 68, 0.3);
            animation: glitch 4s infinite;
            position: relative;
            margin-bottom: 10px;
        }

        .error-code::before,
        .error-code::after {
            content: '404';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .error-code::before {
            color: rgba(255, 23, 68, 0.4);
            animation: glitch-before 4s infinite;
        }

        .error-code::after {
            color: rgba(0, 200, 255, 0.15);
            animation: glitch-after 4s infinite;
        }

        @keyframes glitch {

            0%,
            90%,
            100% {
                transform: skew(0deg);
            }

            92% {
                transform: skew(0.5deg) scaleX(1.01);
            }

            94% {
                transform: skew(-0.5deg) scaleX(0.99);
            }

            96% {
                transform: skew(0.3deg);
            }
        }

        @keyframes glitch-before {

            0%,
            90%,
            100% {
                transform: translate(0);
                clip-path: none;
            }

            92% {
                transform: translate(-3px, 1px);
                clip-path: polygon(0 30%, 100% 30%, 100% 50%, 0 50%);
            }

            94% {
                transform: translate(3px, -1px);
                clip-path: polygon(0 60%, 100% 60%, 100% 80%, 0 80%);
            }
        }

        @keyframes glitch-after {

            0%,
            90%,
            100% {
                transform: translate(0);
                clip-path: none;
            }

            92% {
                transform: translate(3px, -1px);
                clip-path: polygon(0 40%, 100% 40%, 100% 60%, 0 60%);
            }

            94% {
                transform: translate(-3px, 1px);
                clip-path: polygon(0 10%, 100% 10%, 100% 30%, 0 30%);
            }
        }

        .error-title {
            font-size: clamp(18px, 4vw, 32px);
            font-weight: 700;
            color: var(--st-red-glow);
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255, 107, 107, 0.5);
        }

        .error-desc {
            font-size: clamp(14px, 2vw, 18px);
            color: var(--st-text-muted);
            max-width: 500px;
            line-height: 1.7;
            margin-bottom: 50px;
        }

        .error-desc em {
            color: var(--st-red-bright);
            font-style: normal;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn-primary {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 32px;
            background: linear-gradient(135deg, #b71c1c, #ff1744);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 15px;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(183, 28, 28, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(255, 23, 68, 0.5);
        }

        .btn-ghost {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 32px;
            background: transparent;
            color: var(--st-text);
            text-decoration: none;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            font-weight: 500;
            font-size: 15px;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .btn-ghost:hover {
            border-color: var(--st-red-bright);
            color: var(--st-red-bright);
            background: rgba(255, 23, 68, 0.08);
        }

        /* Flickering lights string */
        .lights-strip {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-around;
            padding: 8px 20px;
            z-index: 20;
        }

        .bulb {
            width: 10px;
            height: 14px;
            border-radius: 50% 50% 40% 40%;
            background: var(--bulb-color, #ff1744);
            box-shadow: 0 0 8px var(--bulb-color, #ff1744), 0 0 20px var(--bulb-color, #ff1744);
            animation: flicker var(--dur, 2s) infinite var(--delay, 0s);
        }

        @keyframes flicker {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.1;
            }

            75% {
                opacity: 0.8;
            }

            80% {
                opacity: 0.2;
            }

            85% {
                opacity: 1;
            }
        }

        /* Upside down "fog" at bottom */
        .fog {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 200px;
            background: linear-gradient(transparent, rgba(183, 28, 28, 0.05), rgba(0, 0, 0, 0.8));
            z-index: 5;
            pointer-events: none;
        }

        @media (max-width: 600px) {
            .error-code {
                letter-spacing: -5px;
            }

            .action-buttons {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>

<body>

    <!-- Flickering Lights -->
    <div class="lights-strip" aria-hidden="true">
        <div class="bulb" style="--bulb-color:#ff1744; --dur:1.8s; --delay:0s;"></div>
        <div class="bulb" style="--bulb-color:#ff6d00; --dur:2.3s; --delay:0.3s;"></div>
        <div class="bulb" style="--bulb-color:#ffd600; --dur:1.5s; --delay:0.7s;"></div>
        <div class="bulb" style="--bulb-color:#00e676; --dur:2.1s; --delay:0.1s;"></div>
        <div class="bulb" style="--bulb-color:#2196f3; --dur:1.9s; --delay:0.5s;"></div>
        <div class="bulb" style="--bulb-color:#e040fb; --dur:2.4s; --delay:0.2s;"></div>
        <div class="bulb" style="--bulb-color:#ff1744; --dur:1.7s; --delay:0.9s;"></div>
        <div class="bulb" style="--bulb-color:#ff6d00; --dur:2.0s; --delay:0.4s;"></div>
        <div class="bulb" style="--bulb-color:#ffd600; --dur:1.6s; --delay:0.8s;"></div>
        <div class="bulb" style="--bulb-color:#00e676; --dur:2.2s; --delay:0.6s;"></div>
        <div class="bulb" style="--bulb-color:#2196f3; --dur:1.8s; --delay:0.15s;"></div>
        <div class="bulb" style="--bulb-color:#e040fb; --dur:2.5s; --delay:0.35s;"></div>
    </div>

    <canvas id="particles-canvas"></canvas>
    <div class="fog"></div>

    <div class="page-wrapper">
        <div class="error-code" aria-label="Erreur 404">404</div>
        <h1 class="error-title">Le Monde à l'Envers</h1>
        <p class="error-desc">
            Cette page a été engloutie par le <em>Upside Down</em>.<br>
            Elle n'existe pas — ou n'existe plus dans cette dimension.
        </p>
        <div class="action-buttons">
            <a href="index.html" class="btn-primary">
                ⇠ Retour au Portail
            </a>
            <a href="javascript:history.back()" class="btn-ghost">
                ↩ Page précédente
            </a>
        </div>
    </div>

    <script>
        // Floating particle effect
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function createParticle() {
            return {
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2 + 0.5,
                speedX: (Math.random() - 0.5) * 0.3,
                speedY: -(Math.random() * 0.5 + 0.2),
                opacity: Math.random() * 0.5 + 0.1,
                color: Math.random() > 0.7 ? '#ff1744' : '#888'
            };
        }

        function initParticles() {
            particles = [];
            for (let i = 0; i < 120; i++) {
                particles.push(createParticle());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, i) => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.opacity;
                ctx.fill();
                ctx.globalAlpha = 1;

                p.x += p.speedX;
                p.y += p.speedY;

                if (p.y < -10 || p.x < -10 || p.x > canvas.width + 10) {
                    particles[i] = createParticle();
                    particles[i].y = canvas.height + 10;
                }
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => {
            resize();
            initParticles();
        });

        resize();
        initParticles();
        animate();
    </script>
</body>

</html>
